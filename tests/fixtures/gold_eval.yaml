- query: "What does AAOIFI require before resale in a murabaha transaction?"
  answerable: true
  required_source_ids: ["AAOIFI_Standard_28_en_Financial_Accounting_Standard_2_8"]
  expected_answer_contains: ["ownership", "risk transfer"]
  forbidden_claims: ["guaranteed profit without ownership"]

- query: "How should investment in real estate held for rental income be recognized under AAOIFI?"
  answerable: true
  required_source_ids: ["AAOIFI_Standard_40_en_Financial_Accounting_Standard_No._(26)_Financial_Accounting_Standard_No._(26)"]
  expected_answer_contains: ["investment in real estate", "recognised"]
  forbidden_claims: ["fair value is always prohibited"]

