<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mushir Sharia Chatbot</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/chat.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/dark.css">
</head>
<body>
  <header>
    <h1>Mushir Sharia Chatbot</h1>
    <button id="new-chat" class="header-btn" type="button" title="Start a new conversation">New Chat</button>
  </header>
  <main>
    <aside id="history-sidebar" aria-label="Previous chats">
      <div class="sidebar-heading">Previous chats</div>
      <div id="conversation-list" class="conversation-list" role="list"></div>
    </aside>
    <section class="chat-panel" aria-label="Current chat">
      <section id="messages" aria-live="polite" aria-label="Chat messages">
        <div class="message assistant" dir="auto">Ask a Sharia compliance question in English or Arabic.</div>
      </section>
      <form id="chat-form" aria-label="Chat input form">
        <div class="controls">
          <label class="disclaimer-ack">
            <input id="disclaimer-ack" name="disclaimer_acknowledged" type="checkbox">
            <span>I understand Mushir gives informational guidance only, not a binding fatwa, legal advice, or financial advice.</span>
          </label>
          <textarea id="prompt" name="prompt" placeholder="Ask about an Islamic finance transaction..." dir="auto"></textarea>
        </div>
        <button id="send" type="submit">Ask Mushir</button>
      </form>
    </section>
  </main>
  <script src="/static/js/sse-client.js"></script>
  <script src="/static/js/renderer.js"></script>
  <script src="/static/js/storage.js"></script>
  <script src="/static/js/shortcuts.js"></script>
  <script src="/static/js/flyout.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
