<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mushir Sharia Chatbot</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/chat.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/dark.css">
</head>
<body>
  <header><h1>Mushir Sharia Chatbot</h1></header>
  <main>
    <section id="messages" aria-live="polite" aria-label="Chat messages">
      <div class="message assistant" dir="auto">Ask a Sharia compliance question — in English or Arabic. / اسأل سؤالاً عن الامتثال الشرعي باللغة الإنجليزية أو العربية.</div>
    </section>
    <form id="chat-form" aria-label="Chat input form">
      <div class="controls">
        <textarea id="prompt" name="prompt" placeholder="Ask Mushir about an Islamic finance transaction... / اسأل مشير عن معاملة مالية إسلامية..." dir="auto">I want to invest in a company</textarea>
      </div>
      <button id="send" type="submit">Ask Mushir</button>
    </form>
  </main>
  <script src="/static/js/sse-client.js"></script>
  <script src="/static/js/renderer.js"></script>
  <script src="/static/js/storage.js"></script>
  <script src="/static/js/shortcuts.js"></script>
  <script src="/static/js/flyout.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
