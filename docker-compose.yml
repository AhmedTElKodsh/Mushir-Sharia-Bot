services:
  sharia-bot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - VECTOR_DB_TYPE=${VECTOR_DB_TYPE:-chroma}
      - CHROMA_DIR=/app/chroma_db_multilingual
      - EMBED_MODEL=${EMBED_MODEL:-sentence-transformers/paraphrase-multilingual-mpnet-base-v2}
      - REQUIRE_ARABIC_RETRIEVAL=${REQUIRE_ARABIC_RETRIEVAL:-true}
      - CORPUS_DIR=/app/gemini-gem-prototype/knowledge-base
      - SESSION_STORE_TYPE=${SESSION_STORE_TYPE:-memory}
      - SESSION_EXPIRY_MINUTES=${SESSION_EXPIRY_MINUTES:-30}
      - RATE_LIMIT_STORE_TYPE=${RATE_LIMIT_STORE_TYPE:-memory}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-3600}
      - CACHE_STORE_TYPE=${CACHE_STORE_TYPE:-memory}
      - RESPONSE_CACHE_TTL_SECONDS=${RESPONSE_CACHE_TTL_SECONDS:-86400}
      - REQUIRE_DISCLAIMER_ACK=${REQUIRE_DISCLAIMER_ACK:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/app/logs
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
