version: '3.8'

services:
  sharia-bot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
      - VECTOR_DB_TYPE=chroma
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=aaoifi_standards
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - DOCUMENT_DB_TYPE=sqlite
      - SQLITE_DB_PATH=/app/data/documents.db
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://mushir:mushir@postgres:5432/mushir
      - SESSION_EXPIRY_MINUTES=30
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - qdrant
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=mushir
      - POSTGRES_PASSWORD=mushir
      - POSTGRES_DB=mushir
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
